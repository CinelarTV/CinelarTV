<%
  db_url = ENV['CINELAR_DB_URL']
  if db_url
    uri = URI.parse(db_url)
    db_name = uri.path.delete('/')
    db_host = uri.host
    db_port = uri.port || 5432
    db_user = uri.user || 'cinelar'
    db_pass = uri.password || 'cinelar'
    query_params = URI.decode_www_form(uri.query || '').to_h
    db_sslmode = query_params['sslmode'] || ENV['CINELAR_DB_SSL_MODE'] || 'prefer'

    endpoint_id = db_host&.split('.')&.first
    if endpoint_id && endpoint_id.start_with?('ep-')
      query_params['options'] ||= "endpoint=#{endpoint_id}"
    end

    db_url_rebuilt = "postgresql://#{db_user}:#{db_pass}@#{db_host}:#{db_port}/#{db_name}"
    db_url_rebuilt += "?#{URI.encode_www_form(query_params)}" if query_params.any?
  else
    db_name = ENV['CINELAR_DB'] || 'cinelar'
    db_host = ENV['CINELAR_DB_HOSTNAME'] || 'localhost'
    db_user = ENV['CINELAR_DB_USERNAME'] || 'cinelar'
    db_pass = ENV['CINELAR_DB_PASSWORD'] || 'cinelar'
    db_port = ENV['CINELAR_DB_PORT'] || 5432
    db_sslmode = ENV['CINELAR_DB_SSL_MODE'] || 'prefer'
    db_url_rebuilt = nil
  end
%>

default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  sslmode: <%= db_sslmode %>

development:
  <<: *default
  <% if db_url_rebuilt %>
  url: <%= db_url_rebuilt %>
  <% else %>
  database: <%= db_name %>
  host: <%= db_host %>
  username: <%= db_user %>
  password: <%= db_pass %>
  port: <%= db_port %>
  <% end %>

test:
  <<: *default
  <% if db_url_rebuilt %>
  url: <%= db_url_rebuilt.sub(/\/([^\/]+)$/, '/\1_test') %>
  <% else %>
  database: <%= db_name %>_test
  host: <%= db_host %>
  username: <%= db_user %>
  password: <%= db_pass %>
  port: <%= db_port %>
  <% end %>

production:
  <<: *default
  <% if db_url_rebuilt %>
  url: <%= db_url_rebuilt %>
  <% else %>
  database: <%= db_name %>
  host: <%= db_host %>
  username: <%= db_user %>
  password: <%= db_pass %>
  port: <%= db_port %>
  <% end %>

