:queues:
  - [subscriptions, 5]
  - [default, 3]
  - [xmltv, 2]

:scheduler:
  :schedule:
    # Run every 15 minutes
    verify_instance_license:
      every: '15m'
      class: LicenseValidationJob
      queue: 'default'
      description: 'Verify if the license for this CinelarTV instance is valid'
    get_top_10_for_country:
      every: '1h'
      class: Top10ContentJob
      queue: 'default'
      description: 'Get the top 10 movies for each country'
    fetch_xmltv:
      every: '1h'
      class: XmltvFetchJob
      queue: 'xmltv'
      description: 'Fetch and parse XMLTV sources for Live TV program guide'