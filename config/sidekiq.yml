:queues:
  - [ video_transcoding, 7 ]
  - [ subscriptions, 5 ]
  - [ default, 3 ]
  - [ xmltv, 2 ]

:scheduler:
  :schedule:
    # Run every 15 minutes
    verify_instance_license:
      every: "15m"
      class: LicenseValidationJob
      queue: "default"
      description: "Verify if the license for this CinelarTV instance is valid"
    check_for_updates:
      every: "15m"
      class: UpdateCheckJob
      queue: "default"
      description: "Refresh cached remote git version for updater checks"
    get_top_10_for_country:
      every: "1h"
      class: Top10ContentJob
      queue: "default"
      description: "Get the top 10 movies for each country"
    media_integrity_checker:
      every: "1d" # Every 24 hours
      class: MediaScannerJob
      queue: "default"
      description: "Daily check for media integrity (broken links)"
    fetch_xmltv:
      every:
        - "1h"
      class: XmltvFetchJob
      queue: "xmltv"
      description: "Fetch and parse XMLTV sources for Live TV program guide (static)"
    unsuspend_expired_users:
      every: "1d"
      class: UnsuspendExpiredUsersJob
      queue: "default"
      description: "Unsuspend users whose suspended_until passed"
    recalculate_content_analytics:
      every: "1d"
      class: RecalculateContentAnalyticsJob
      queue: "default"
      description: "Recalculate content analytics from watch sessions"
    end_stale_watch_sessions:
      every: "30m"
      class: EndStaleWatchSessionsJob
      queue: "default"
      description: "Close stale watch sessions older than 2 hours"
    sync_open_iap_subscriptions:
      every: "15m"
      class: OpenIapSyncJob
      queue: "subscriptions"
      description: "Sync OpenIAP subscription states from Kit REST API"
