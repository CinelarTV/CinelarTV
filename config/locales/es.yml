---
es:
  email_templates:
    devise_confirmation_instructions:
      subject: "Confirma tu cuenta"
      body: "<p>¡Bienvenido %{username}!</p><p>Puedes confirmar tu cuenta de correo
        electrónico a través del siguiente
        enlace:</p><p>%{confirmation_url}</p>"
    devise_reset_password_instructions:
      subject: "Restablecer tu contraseña"
      body: "<p>Hola %{username},</p><p>Alguien ha solicitado un enlace para cambiar
        tu contraseña. Puedes hacerlo a través del siguiente
        enlace.</p><p>%{edit_password_url}</p><p>Si no solicitaste esto, por
        favor ignora este correo.</p>"
    devise_unlock_instructions:
      subject: "Desbloquear tu cuenta"
      body: "<p>Hola %{username},</p><p>Tu cuenta ha sido bloqueada debido a
        demasiados intentos fallidos de inicio de sesión.</p><p>Haz clic en el
        siguiente enlace para desbloquear tu cuenta:</p><p>%{unlock_url}</p>"
    devise_email_changed:
      subject: "Correo electrónico cambiado"
      body: "<p>Hola %{username},</p><p>Te contactamos para notificarte que tu correo
        electrónico ha sido cambiado a %{new_email}.</p>"
  activerecord:
    errors:
      messages:
        invalid: "Inválido %{model}"
        record_invalid: "La validación falló: %{errors}"
