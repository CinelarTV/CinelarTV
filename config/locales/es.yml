---
es:
  email_templates:
    devise_confirmation_instructions:
      subject: "Confirma tu cuenta en %{site_name}"
      body: |
        <h2>¡Bienvenido, %{username}!</h2>
        <p>Gracias por registrarte en <strong>%{site_name}</strong>. Estamos encantados de tenerte con nosotros.</p>
        <p>Por favor confirma tu dirección de correo electrónico haciendo clic en el botón a continuación. Esto verificará tu cuenta y te dará acceso completo.</p>
        <table width="100%" cellpadding="0" cellspacing="0">
          <tr>
            <td align="center">
              <a href="%{confirmation_url}" class="email-button">Confirmar Mi Cuenta</a>
            </td>
          </tr>
        </table>
        <p class="email-muted">Si no creaste una cuenta, puedes ignorar este correo de forma segura.</p>
    devise_reset_password_instructions:
      subject: "Restablece tu contraseña en %{site_name}"
      body: |
        <h2>Solicitud de restablecimiento de contraseña</h2>
        <p>Hola <strong>%{username}</strong>,</p>
        <p>Recibimos una solicitud para restablecer la contraseña de tu cuenta en <strong>%{site_name}</strong>. Haz clic en el botón a continuación para elegir una nueva contraseña:</p>
        <table width="100%" cellpadding="0" cellspacing="0">
          <tr>
            <td align="center">
              <a href="%{edit_password_url}" class="email-button">Restablecer Mi Contraseña</a>
            </td>
          </tr>
        </table>
        <p class="email-muted">Este enlace expirará en 24 horas. Si no solicitaste un restablecimiento de contraseña, puedes ignorar este correo &mdash; tu contraseña permanecerá sin cambios.</p>
    devise_unlock_instructions:
      subject: "Desbloquea tu cuenta en %{site_name}"
      body: |
        <h2>Cuenta bloqueada</h2>
        <p>Hola <strong>%{username}</strong>,</p>
        <p>Tu cuenta en <strong>%{site_name}</strong> ha sido bloqueada debido a demasiados intentos fallidos de inicio de sesión. Esta es una medida de seguridad para proteger tu cuenta.</p>
        <p>Haz clic en el botón a continuación para desbloquear tu cuenta e intentar iniciar sesión nuevamente:</p>
        <table width="100%" cellpadding="0" cellspacing="0">
          <tr>
            <td align="center">
              <a href="%{unlock_url}" class="email-button">Desbloquear Mi Cuenta</a>
            </td>
          </tr>
        </table>
        <p class="email-muted">Si no intentaste iniciar sesión, por favor contacta a nuestro equipo de soporte inmediatamente.</p>
    devise_email_changed:
      subject: "Tu correo ha sido cambiado en %{site_name}"
      body: |
        <h2>Dirección de correo actualizada</h2>
        <p>Hola <strong>%{username}</strong>,</p>
        <p>Te escribimos para informarte que la dirección de correo de tu cuenta en <strong>%{site_name}</strong> ha sido cambiada a:</p>
        <table width="100%" cellpadding="0" cellspacing="0">
          <tr>
            <td align="center" class="email-highlight-box">
              <span class="email-highlight-text">%{new_email}</span>
            </td>
          </tr>
        </table>
        <p class="email-muted">Si no realizaste este cambio, por favor contacta a nuestro equipo de soporte inmediatamente para asegurar tu cuenta.</p>
