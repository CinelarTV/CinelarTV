---
pt-BR:
  email_templates:
    devise_confirmation_instructions:
      subject: "Confirme sua conta"
      body: "<p>Bem-vindo %{username}!</p><p>Você pode confirmar sua conta de email
        através do link abaixo:</p><p>%{confirmation_url}</p>"
    devise_reset_password_instructions:
      subject: "Redefinir sua senha"
      body: "<p>Olá %{username},</p><p>Alguém solicitou um link para alterar sua
        senha. Você pode fazer isso através do link
        abaixo.</p><p>%{edit_password_url}</p><p>Se você não solicitou isso, por
        favor ignore este email.</p>"
    devise_unlock_instructions:
      subject: "Desbloquear sua conta"
      body: "<p>Olá %{username},</p><p>Sua conta foi bloqueada devido a muitas
        tentativas de login falhadas.</p><p>Clique no link abaixo para
        desbloquear sua conta:</p><p>%{unlock_url}</p>"
    devise_email_changed:
      subject: "Email alterado"
      body: "<p>Olá %{username},</p><p>Estamos entrando em contato para notificá-lo
        que seu email foi alterado para %{new_email}.</p>"
  activerecord:
    errors:
      messages:
        invalid: "%{model} inválido"
        record_invalid: "Falha na validação: %{errors}"
      models:
        profile:
          attributes:
            name:
              blank: "O nome não pode ficar em branco"
              too_short: "O nome é muito curto, deve ter pelo menos %{count} caracteres"
  dashboard:
    memory_warning: "Seu servidor está funcionando com menos de 1 GB de memória
      total. O CinelarTV recomenda pelo menos 1 GB de memória para funcionar
      corretamente."
    sidekiq_warning: "Sidekiq is not running. Many tasks, like sending emails or
      processing recommendations, are executed asynchronously by Sidekiq. Please
      ensure at least one Sidekiq process is running. <a
      href='https://github.com/mperham/sidekiq' target='_blank'>Learn about
      Sidekiq here</a>."
    updates_available: "It seems that there are updates available for CinelarTV. <a
      href='/admin/updates'>Click here to update</a>."
  devise:
    failure:
      account_suspended: "Your account has been suspended. Please contact support for
        more information."
      invalid: "Invalid email or password."
      locked: "Your account is locked."
      timeout: "Your session has expired. Please sign in again to continue."
