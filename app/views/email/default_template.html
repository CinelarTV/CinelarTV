<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" lang="%{html_lang}" xml:lang="%{html_lang}">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    %{dark_mode_meta_tags}
    <meta name="x-apple-disable-message-reformatting" />
    <title></title>
    <!--[if mso]>
    <style type="text/css">
      body, table, td, th, h1, h2, h3, h4, h5, h6, p, a, span {
        font-family: Helvetica, Arial, sans-serif !important;
      }
    </style>
    <![endif]-->
    <style>
      body, table, td, th, p, a, span {
        -webkit-text-size-adjust: 100%;
        -ms-text-size-adjust: 100%;
        mso-line-height-rule: exactly;
      }
      table, td {
        border-collapse: collapse !important;
        mso-table-lspace: 0pt;
        mso-table-rspace: 0pt;
      }
      img {
        border: 0;
        line-height: 100%;
        outline: none;
        text-decoration: none;
        -ms-interpolation-mode: bicubic;
        max-width: 100%;
        height: auto;
      }
      body {
        height: 100% !important;
        margin: 0 !important;
        padding: 0 !important;
        width: 100% !important;
        background-color: #f0f0f0;
      }
      h2 {
        margin: 0 0 20px 0;
        font-size: 22px;
        font-weight: 600;
        color: #1a1a1a;
        line-height: 1.3;
      }
      p {
        margin: 0 0 16px 0;
        font-size: 16px;
        color: #333333;
        line-height: 1.7;
      }
      strong {
        font-weight: 600;
      }
      .email-button {
        display: inline-block;
        background: #0084F0;
        color: #ffffff;
        padding: 14px 32px;
        border-radius: 8px;
        text-decoration: none;
        font-weight: 600;
        font-size: 16px;
      }
      .email-button:hover {
        background: #0073d6;
      }
      .email-muted {
        font-size: 14px;
        color: #999999;
        line-height: 1.6;
      }
      .email-highlight-box {
        background: #f0f4f8;
        border-radius: 8px;
        padding: 14px 20px;
        border: 1px solid #e2e8f0;
      }
      .email-highlight-text {
        font-size: 16px;
        font-weight: 600;
        color: #1a1a1a;
      }
      @media only screen and (max-width: 600px) {
        .email-wrapper { padding: 10px 5px !important; }
        .email-container { width: 100% !important; }
        .email-header { padding: 30px 20px !important; }
        .email-body { padding: 30px 20px !important; }
        .email-footer { padding: 20px !important; }
        .email-header h1 { font-size: 24px !important; }
        .email-button { display: block !important; width: 100% !important; text-align: center !important; }
        .email-button a { display: block !important; margin: 0 auto !important; }
      }
    </style>
    %{dark_mode_styles}
  </head>
  <body style="margin: 0; padding: 0; width: 100%; background-color: #f0f0f0; font-family: Helvetica, Arial, sans-serif;">
    <div style="display: none; max-height: 0; overflow: hidden;">%{email_preview}</div>
    <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%" style="background-color: #f0f0f0;">
      <tr>
        <td align="center" style="padding: 20px 0;">
          <!--[if gte mso 9]>
          <table width="600" align="center" cellpadding="0" cellspacing="0" border="0">
            <tr>
              <td>
          <![endif]-->
          <table role="presentation" class="email-container" border="0" cellpadding="0" cellspacing="0" width="100%" style="max-width: 600px; margin: 0 auto; border-collapse: collapse;">
            <tr>
              <td>
                %{email_content}
              </td>
            </tr>
          </table>
          <!--[if gte mso 9]>
              </td>
            </tr>
          </table>
          <![endif]-->
        </td>
      </tr>
    </table>
    <div style="display: none; white-space: nowrap; font: 15px courier; line-height: 0;">
      &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;
    </div>
  </body>
</html>
